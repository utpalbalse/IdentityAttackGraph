<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" width="760" height="600" role="img" aria-label="IdentityAttackGraph — explainable 6-factor risk breakdown">
  <defs>
    <linearGradient id="fbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6d7cff"/><stop offset="100%" stop-color="#8b9bff"/></linearGradient>
  </defs>
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif">
    <rect width="760" height="600" fill="#0f1422" stroke="#20283d" rx="14"/>

    <!-- header -->
    <text x="40" y="48" font-size="18" font-weight="700" fill="#e8ebf3">svc-billing-export</text>
    <rect x="285" y="34" width="52" height="18" rx="9" fill="rgba(251,146,60,0.16)"/><text x="311" y="47" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffae66">HIGH</text>
    <text x="40" y="68" font-size="11.5" font-family="monospace" fill="#6b7591">arn:aws:iam::123456789012:user/svc-billing-export</text>
    <line x1="40" y1="88" x2="720" y2="88" stroke="#1a2134"/>

    <!-- risk ring -->
    <g transform="translate(120,178)">
      <circle r="56" fill="none" stroke="#1a2236" stroke-width="9"/>
      <circle r="56" fill="none" stroke="#fb923c" stroke-width="9" stroke-linecap="round"
              stroke-dasharray="235.8 351.9" transform="rotate(-90)"/>
      <text x="0" y="4" text-anchor="middle" font-size="32" font-weight="750" fill="#e8ebf3">67</text>
      <text x="0" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#fb923c">HIGH</text>
    </g>

    <!-- meta -->
    <g font-size="12.5">
      <text x="230" y="140" font-size="10.5" fill="#6b7591">KIND</text><text x="230" y="160" fill="#e8ebf3">aws_iam_user</text>
      <text x="470" y="140" font-size="10.5" fill="#6b7591">ACCOUNT</text><text x="470" y="160" fill="#e8ebf3">aws:123456789012</text>
      <text x="230" y="196" font-size="10.5" fill="#6b7591">STATE</text><text x="230" y="216" fill="#4fe0ad">active</text>
      <text x="470" y="196" font-size="10.5" fill="#6b7591">BLAST RADIUS</text><text x="470" y="216" fill="#ff8198">1 crown jewel · reaches admin</text>
    </g>

    <line x1="40" y1="256" x2="720" y2="256" stroke="#1a2134"/>
    <text x="40" y="288" font-size="13" font-weight="650" fill="#e8ebf3">Risk breakdown</text>
    <text x="720" y="288" text-anchor="end" font-size="11" fill="#6b7591">explainable · weighted sum · reproducible</text>

    <!-- 6 factor rows: name, weight, score, bar. y pitch 46, track w 680 -->
    <g font-size="12.5">
      <!-- privilege 68 (w .22) -->
      <text x="40" y="322" fill="#9aa3bd">Privilege</text><text x="150" y="322" font-size="10.5" fill="#6b7591">×0.22</text>
      <text x="720" y="322" text-anchor="end" font-weight="700" fill="#e8ebf3">68</text>
      <rect x="40" y="330" width="680" height="7" rx="4" fill="#1a2236"/><rect x="40" y="330" width="462" height="7" rx="4" fill="url(#fbar)"/>

      <!-- blast_radius 82 (w .22) -->
      <text x="40" y="368" fill="#9aa3bd">Blast radius</text><text x="150" y="368" font-size="10.5" fill="#6b7591">×0.22</text>
      <text x="720" y="368" text-anchor="end" font-weight="700" fill="#e8ebf3">82</text>
      <rect x="40" y="376" width="680" height="7" rx="4" fill="#1a2236"/><rect x="40" y="376" width="558" height="7" rx="4" fill="url(#fbar)"/>

      <!-- exposure 90 (w .20) -->
      <text x="40" y="414" fill="#9aa3bd">Exposure</text><text x="150" y="414" font-size="10.5" fill="#6b7591">×0.20</text>
      <text x="720" y="414" text-anchor="end" font-weight="700" fill="#e8ebf3">90</text>
      <rect x="40" y="422" width="680" height="7" rx="4" fill="#1a2236"/><rect x="40" y="422" width="612" height="7" rx="4" fill="url(#fbar)"/>

      <!-- trust 55 (w .14) -->
      <text x="40" y="460" fill="#9aa3bd">Trust</text><text x="150" y="460" font-size="10.5" fill="#6b7591">×0.14</text>
      <text x="720" y="460" text-anchor="end" font-weight="700" fill="#e8ebf3">55</text>
      <rect x="40" y="468" width="680" height="7" rx="4" fill="#1a2236"/><rect x="40" y="468" width="374" height="7" rx="4" fill="url(#fbar)"/>

      <!-- usage 40 (w .12) -->
      <text x="40" y="506" fill="#9aa3bd">Usage</text><text x="150" y="506" font-size="10.5" fill="#6b7591">×0.12</text>
      <text x="720" y="506" text-anchor="end" font-weight="700" fill="#e8ebf3">40</text>
      <rect x="40" y="514" width="680" height="7" rx="4" fill="#1a2236"/><rect x="40" y="514" width="272" height="7" rx="4" fill="url(#fbar)"/>

      <!-- freshness 35 (w .10) -->
      <text x="40" y="552" fill="#9aa3bd">Freshness</text><text x="150" y="552" font-size="10.5" fill="#6b7591">×0.10</text>
      <text x="720" y="552" text-anchor="end" font-weight="700" fill="#e8ebf3">35</text>
      <rect x="40" y="560" width="680" height="7" rx="4" fill="#1a2236"/><rect x="40" y="560" width="238" height="7" rx="4" fill="url(#fbar)"/>
    </g>

    <text x="40" y="588" font-size="10.5" fill="#6b7591">signals: in_private_repo · static_key_no_expiry · reaches_crown_jewel_1hop · assume_no_externalid · impossible_travel</text>
  </g>
</svg>
