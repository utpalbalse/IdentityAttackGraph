<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 680" width="1240" height="680" role="img" aria-label="IdentityAttackGraph — attack-path graph view">
  <defs>
    <radialGradient id="cy" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#10162a"/><stop offset="70%" stop-color="#0a0e1a"/>
    </radialGradient>
    <marker id="aDef" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#33405e"/></marker>
    <marker id="aOrange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fb923c"/></marker>
    <marker id="aTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
  </defs>

  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif">
    <rect width="1240" height="680" fill="#080b14"/>

    <!-- legend -->
    <rect x="16" y="16" width="1208" height="44" rx="12" fill="#0f1422" stroke="#1a2134"/>
    <g font-size="12" fill="#9aa3bd">
      <rect x="34" y="32" width="11" height="11" rx="3" fill="#6d7cff"/><text x="52" y="42">Identity</text>
      <rect x="140" y="32" width="11" height="11" rx="3" fill="#fb923c"/><text x="158" y="42">Role / permission set</text>
      <rect x="322" y="32" width="11" height="11" rx="3" fill="#2dd4bf"/><text x="340" y="42">Resource</text>
      <rect x="430" y="32" width="11" height="11" rx="3" fill="#f43f5e"/><text x="448" y="42">Crown jewel</text>
      <rect x="548" y="32" width="11" height="11" rx="3" fill="#64748b"/><text x="566" y="42">Workload</text>
      <text x="1206" y="42" text-anchor="end" fill="#6b7591">click an identity node to inspect · scroll to zoom · drag to pan</text>
    </g>

    <!-- canvas -->
    <rect x="16" y="72" width="1208" height="592" rx="12" fill="url(#cy)" stroke="#1a2134"/>

    <!-- ===== EDGES (drawn first) ===== -->
    <g stroke-width="2" fill="none">
      <!-- A: leaked key path -->
      <line x1="182" y1="180" x2="440" y2="180" stroke="#fb923c" marker-end="url(#aOrange)"/>
      <line x1="500" y1="180" x2="772" y2="180" stroke="#2dd4bf" marker-end="url(#aTeal)"/>
      <!-- B: AI agent -->
      <line x1="182" y1="350" x2="440" y2="350" stroke="#33405e" marker-end="url(#aDef)"/>
      <line x1="500" y1="350" x2="772" y2="350" stroke="#2dd4bf" marker-end="url(#aTeal)"/>
      <!-- C: k8s -->
      <line x1="182" y1="510" x2="440" y2="510" stroke="#33405e" marker-end="url(#aDef)"/>
      <line x1="500" y1="510" x2="772" y2="510" stroke="#2dd4bf" marker-end="url(#aTeal)"/>
      <!-- C: cross-cloud federation -->
      <line x1="165" y1="528" x2="405" y2="600" stroke="#33405e" stroke-dasharray="5 4" marker-end="url(#aDef)"/>
    </g>

    <!-- edge labels -->
    <g font-size="10.5" fill="#8b93ad">
      <rect x="276" y="164" width="52" height="15" rx="3" fill="#0f1422"/><text x="302" y="175" text-anchor="middle">assumes</text>
      <rect x="602" y="164" width="52" height="15" rx="3" fill="#0f1422"/><text x="628" y="175" text-anchor="middle">binds to</text>
      <rect x="266" y="334" width="94" height="15" rx="3" fill="#0f1422"/><text x="313" y="345" text-anchor="middle">has permissions</text>
      <rect x="602" y="334" width="52" height="15" rx="3" fill="#0f1422"/><text x="628" y="345" text-anchor="middle">binds to</text>
      <rect x="266" y="494" width="94" height="15" rx="3" fill="#0f1422"/><text x="313" y="505" text-anchor="middle">has permissions</text>
      <rect x="602" y="494" width="52" height="15" rx="3" fill="#0f1422"/><text x="628" y="505" text-anchor="middle">binds to</text>
      <rect x="238" y="566" width="118" height="15" rx="3" fill="#0f1422"/><text x="297" y="577" text-anchor="middle">federated_from · IRSA</text>
    </g>

    <!-- ===== NODES ===== -->
    <g font-size="11" fill="#cfd6e6" text-anchor="middle">
      <!-- A -->
      <circle cx="160" cy="180" r="15" fill="#6d7cff" stroke="#2a3350" stroke-width="2"/><text x="160" y="212">svc-billing-export</text>
      <rect x="452" y="169" width="36" height="24" rx="7" fill="#fb923c" stroke="#2a3350" stroke-width="2"/><text x="470" y="212">billing-admin</text>
      <rect x="782" y="164" width="32" height="32" rx="5" transform="rotate(45 798 180)" fill="#f43f5e" stroke="#ff8198" stroke-width="3"/><text x="798" y="216" fill="#ff8198">arn:aws:s3:::prod-billing</text>
      <text x="798" y="146" font-size="9.5" font-weight="700" fill="#ff8198">◆ CROWN JEWEL</text>

      <!-- B -->
      <circle cx="160" cy="350" r="15" fill="#6d7cff" stroke="#2a3350" stroke-width="2"/><text x="160" y="382">prod-copilot-agent</text>
      <rect x="140" y="332" width="24" height="13" rx="4" fill="#2dd4bf"/><text x="152" y="342" font-size="9" font-weight="700" fill="#04211c">AI</text>
      <rect x="452" y="339" width="36" height="24" rx="7" fill="#fb923c" stroke="#2a3350" stroke-width="2"/><text x="470" y="382">agent RBAC (admin)</text>
      <rect x="782" y="334" width="32" height="32" rx="5" transform="rotate(45 798 350)" fill="#f43f5e" stroke="#ff8198" stroke-width="3"/><text x="798" y="386" fill="#ff8198">secretsmanager:prod/app/master</text>
      <text x="798" y="316" font-size="9.5" font-weight="700" fill="#ff8198">◆ CROWN JEWEL</text>

      <!-- C -->
      <circle cx="160" cy="510" r="15" fill="#6d7cff" stroke="#2a3350" stroke-width="2"/><text x="160" y="542">prod/deployer (K8s SA)</text>
      <rect x="452" y="499" width="36" height="24" rx="7" fill="#fb923c" stroke="#2a3350" stroke-width="2"/><text x="470" y="542">cluster-admin</text>
      <rect x="782" y="494" width="32" height="32" rx="5" transform="rotate(45 798 510)" fill="#f43f5e" stroke="#ff8198" stroke-width="3"/><text x="798" y="546" fill="#ff8198">k8s:demo:cluster:secrets</text>
      <text x="798" y="476" font-size="9.5" font-weight="700" fill="#ff8198">◆ CROWN JEWEL</text>

      <!-- AWS role stub (cross-cloud target) -->
      <circle cx="420" cy="600" r="13" fill="#6d7cff" stroke="#2a3350" stroke-width="2" opacity="0.85"/><text x="420" y="628" fill="#9aa3bd">aws:role/prod-deployer</text>
    </g>

    <!-- caption -->
    <text x="1206" y="648" text-anchor="end" font-size="12" fill="#6b7591">
      3 crown-jewel paths · a leaked key, an over-scoped AI agent, and a pod that federates into AWS — each reaches admin in ≤ 2 hops
    </text>
  </g>
</svg>
