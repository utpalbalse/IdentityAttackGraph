      <!-- 1 -->
      <text x="797" y="272" font-size="15">🔑</text>
      <text x="822" y="268" font-size="13" font-weight="550" fill="#e8ebf3">svc-billing-export</text>
      <text x="822" y="284" font-size="11" fill="#6b7591">aws_iam_user · aws:123456789012</text>
      <circle cx="1150" cy="272" r="4" fill="#fb923c"/><text x="1182" y="277" text-anchor="end" font-size="14" font-weight="700" fill="#e8ebf3">67</text>
      <rect x="1188" y="269" width="54" height="6" rx="3" fill="#1a2236"/><rect x="1188" y="269" width="36" height="6" rx="3" fill="url(#bHigh)"/>

      <!-- 2 -->
      <text x="797" y="312" font-size="15">☁</text>
      <text x="822" y="308" font-size="13" font-weight="550" fill="#e8ebf3">data-processor@project…</text>
      <text x="822" y="324" font-size="11" fill="#6b7591">gcp_service_account · gcp:my-gcp-project</text>
      <circle cx="1150" cy="312" r="4" fill="#fb923c"/><text x="1182" y="317" text-anchor="end" font-size="14" font-weight="700" fill="#e8ebf3">46</text>
      <rect x="1188" y="309" width="54" height="6" rx="3" fill="#1a2236"/><rect x="1188" y="309" width="25" height="6" rx="3" fill="url(#bHigh)"/>

      <!-- 3 -->
      <text x="797" y="352" font-size="15">⎈</text>
      <text x="822" y="348" font-size="13" font-weight="550" fill="#e8ebf3">prod/deployer</text>
      <text x="822" y="364" font-size="11" fill="#6b7591">k8s_service_account · k8s:demo</text>
      <circle cx="1150" cy="352" r="4" fill="#fbbf24"/><text x="1182" y="357" text-anchor="end" font-size="14" font-weight="700" fill="#e8ebf3">40</text>
      <rect x="1188" y="349" width="54" height="6" rx="3" fill="#1a2236"/><rect x="1188" y="349" width="22" height="6" rx="3" fill="url(#bMed)"/>

      <!-- 4 (AI agent) -->
      <text x="797" y="392" font-size="15">🤖</text>
      <text x="822" y="388" font-size="13" font-weight="550" fill="#e8ebf3">prod-copilot-agent</text>
      <rect x="963" y="378" width="24" height="13" rx="4" fill="#2dd4bf"/><text x="975" y="388" text-anchor="middle" font-size="9" font-weight="700" fill="#04211c">AI</text>
      <text x="822" y="404" font-size="11" fill="#6b7591">ai_agent · aws:123456789012</text>
      <circle cx="1150" cy="392" r="4" fill="#fbbf24"/><text x="1182" y="397" text-anchor="end" font-size="14" font-weight="700" fill="#e8ebf3">39</text>
      <rect x="1188" y="389" width="54" height="6" rx="3" fill="#1a2236"/><rect x="1188" y="389" width="21" height="6" rx="3" fill="url(#bMed)"/>

      <!-- 5 -->
      <text x="797" y="432" font-size="15">🔑</text>
      <text x="822" y="428" font-size="13" font-weight="550" fill="#e8ebf3">svc-orphaned</text>
      <text x="822" y="444" font-size="11" fill="#6b7591">aws_iam_user · aws:987654321098</text>
      <circle cx="1150" cy="432" r="4" fill="#fbbf24"/><text x="1182" y="437" text-anchor="end" font-size="14" font-weight="700" fill="#e8ebf3">31</text>
      <rect x="1188" y="429" width="54" height="6" rx="3" fill="#1a2236"/><rect x="1188" y="429" width="17" height="6" rx="3" fill="url(#bMed)"/>
