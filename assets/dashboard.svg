    <rect x="775" y="200" width="475" height="270" rx="12" fill="#0f1422" stroke="#1a2134"/>
    <text x="795" y="230" font-size="14" font-weight="650" fill="#e8ebf3">Triage queue</text>
    <text x="1230" y="230" text-anchor="end" font-size="11" fill="#6b7591">by urgency</text>
    <g>
