      <rect x="376" y="344" width="335" height="8" rx="4" fill="#1a2236"/><rect x="376" y="344" width="128" height="8" rx="4" fill="url(#bMed)"/>
      <text x="741" y="352" text-anchor="end" fill="#9aa3bd">16</text>

      <text x="306" y="392" font-weight="600" fill="#e8ebf3">Low</text>
      <rect x="376" y="384" width="335" height="8" rx="4" fill="#1a2236"/>
      <text x="741" y="392" text-anchor="end" fill="#9aa3bd">0</text>
    </g>
    <line x1="306" y1="420" x2="741" y2="420" stroke="#1a2134"/>
    <text x="306" y="446" font-size="11.5" fill="#6b7591">Top category:  exposure · privilege · trust — each finding carries evidence + an attack narrative</text>

