      <rect x="8" y="101" width="3" height="22" rx="1.5" fill="#6d7cff"/>
      <text x="30" y="117" fill="#c3caff">▦</text><text x="52" y="117" fill="#c3caff" font-weight="600">Overview</text>

      <text x="30" y="161" fill="#9aa3bd">▤</text><text x="52" y="161" fill="#9aa3bd">Inventory</text>
      <text x="30" y="201" fill="#9aa3bd">🕸</text><text x="52" y="201" fill="#9aa3bd">Attack graph</text>
      <text x="30" y="241" fill="#9aa3bd">◈</text><text x="52" y="241" fill="#9aa3bd">Triage</text>
      <rect x="196" y="230" width="34" height="18" rx="9" fill="#f43f5e"/>
      <text x="213" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">42</text>
      <text x="30" y="281" fill="#9aa3bd">✓</text><text x="52" y="281" fill="#9aa3bd">Remediation</text>
      <text x="30" y="321" fill="#9aa3bd">⚙</text><text x="52" y="321" fill="#9aa3bd">Settings</text>
    </g>

    <!-- sidebar footer -->
    <line x1="18" y1="742" x2="238" y2="742" stroke="#1a2134"/>
    <circle cx="26" cy="766" r="4" fill="#34d399"/>
    <text x="40" y="770" font-size="12" fill="#9aa3bd">Connected · 3 accounts</text>
    <text x="26" y="788" font-size="11" fill="#6b7591">last collection 2m ago</text>

    <!-- ================= TOPBAR ================= -->
