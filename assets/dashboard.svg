    <text x="39" y="47" text-anchor="middle" font-size="19" fill="#ffffff">◆</text>
    <text x="70" y="38" font-size="14" font-weight="700" fill="#e8ebf3">IdentityAttackGraph</text>
    <text x="70" y="54" font-size="11" fill="#6b7591">NHI security console</text>

    <!-- nav -->
    <g font-size="13.5">
