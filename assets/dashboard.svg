<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="IdentityAttackGraph dashboard — Overview">
  <defs>
    <radialGradient id="bg" cx="80%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#131a30"/><stop offset="55%" stop-color="#080b14"/>
    </radialGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1120"/><stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d7cff"/><stop offset="100%" stop-color="#8b5cf6"/>
