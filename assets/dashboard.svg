        <text x="467" y="140" font-size="26" font-weight="750" fill="#e8ebf3">5</text><text x="467" y="160" font-size="11.5" fill="#9aa3bd">Crown jewels</text>
      </g>
      <g>
        <rect x="612" y="100" width="149" height="76" rx="12" fill="#0f1422" stroke="#1a2134"/><rect x="612" y="100" width="3" height="76" fill="#f43f5e"/>
        <text x="630" y="140" font-size="26" font-weight="750" fill="#ff6b81">4</text><text x="630" y="160" font-size="11.5" fill="#9aa3bd">Critical</text>
