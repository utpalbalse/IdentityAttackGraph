{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nhiid.fullname" . }}-migrate
  labels:
    {{- include "nhiid.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run before the app on install and every upgrade; clean up old hook jobs.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "nhiid.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "nhiid.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "nhiid.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["migrate", "up"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            {{- include "nhiid.backendEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "nhiid.configMounts" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
      volumes:
        {{- include "nhiid.configVolume" . | nindent 8 }}
{{- end }}
