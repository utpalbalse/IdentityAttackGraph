apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nhiid.fullname" . }}-worker
  labels:
    {{- include "nhiid.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  # The worker holds a NATS queue subscription and runs periodic jobs; avoid two rolling at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nhiid.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "nhiid.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "nhiid.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "nhiid.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["worker"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
          env:
            {{- include "nhiid.backendEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 20
          volumeMounts:
            {{- include "nhiid.configMounts" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        {{- include "nhiid.configVolume" . | nindent 8 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nhiid.fullname" . }}-worker
  labels:
    {{- include "nhiid.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    nhiid.io/metrics: "true"
spec:
  type: ClusterIP
  clusterIP: None      # headless; exists only to expose /metrics for scraping
  selector:
    {{- include "nhiid.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  ports:
    - name: metrics
      port: {{ .Values.worker.metricsPort }}
      targetPort: metrics
