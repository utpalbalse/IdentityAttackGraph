services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nhiid
      POSTGRES_PASSWORD: nhiid
      POSTGRES_DB: nhiid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nhiid" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --jetstream --max_payload=1G
    healthcheck:
      test: [ "CMD", "/nats", "-s", "nats://localhost:4222", "pub", "test", "test" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
