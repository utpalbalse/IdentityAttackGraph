# NHIID default configuration. Override any value via env: NHIID_<SECTION>_<KEY> (upper snake).
# Secrets (db password, tokens) should come from env / secret store, never this file.

server:
  http_addr: ":8080"
  metrics_addr: ":9090"      # Prometheus /metrics listener
  read_timeout_seconds: 15
  write_timeout_seconds: 30
  rate_limit_per_min: 600    # per-principal Redis rate limit; 0 disables

database:
  # DSN may also be supplied via NHIID_DATABASE_DSN
  dsn: "postgres://nhiid:nhiid@localhost:5432/nhiid?sslmode=disable"
  max_conns: 20
  min_conns: 2

queue:
  nats_url: "nats://localhost:4222"
  stream: "nhiid-jobs"

cache:
  redis_url: "redis://localhost:6379/0"

telemetry:
  log_level: "info"        # debug|info|warn|error
  log_format: "json"       # json|text
  otel_endpoint: ""        # empty disables tracing export

detection:
  stale_window_days: 90
  max_cred_age_days: 365
  max_rotation_age_days: 180
  impossible_travel_max_kmh: 900
  usage_spike_sigma: 4
  anomaly_warmup_events: 50
  # CIDR allowlist for known egress/VPN to suppress geo/ASN anomalies
  egress_allowlist: []

risk:
  weights_file: "configs/risk_weights.yaml"

notify:
  # Outbound alerting for new findings (worker alert sweep). Disabled by default.
  enabled: false
  kind: "slack"            # slack (incoming webhook) | webhook (generic JSON POST)
  webhook_url: ""          # supply via NHIID_NOTIFY_WEBHOOK_URL (a secret) in production
  min_severity: "high"     # alert on findings at or above: info|low|medium|high|critical

auth:
  # off   = API open (default; demo/UI work unauthenticated, actor from X-Actor header)
  # token = require `Authorization: Bearer <token>`; tokens map to roles (viewer|analyst|admin)
  # jwt   = validate OIDC bearer JWTs (HS256 secret or RS256 public key), role from a claim
  mode: "off"
  # token mode: entries via NHIID_AUTH_TOKENS (JSON) or this file path:
  # [{"token":"...","subject":"alice@sec","role":"admin"}]
  tokens_file: ""
  # jwt mode:
  jwt_secret: ""            # HS256 shared secret (or NHIID_AUTH_JWT_SECRET)
  jwt_public_key_file: ""   # RS256 IdP public key (PEM)
  jwt_role_claim: "role"    # claim holding the role or groups array
  jwt_issuer: ""
  jwt_audience: ""
