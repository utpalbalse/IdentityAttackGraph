name: release

# On a version tag: build + push the backend and web images to GHCR, then cut a GitHub release
# with auto-generated notes. Uses the built-in GITHUB_TOKEN — no extra secrets required.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the release
  packages: write   # push images to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/identityattackgraph:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/identityattackgraph:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/identityattackgraph-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/identityattackgraph-web:latest

      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
